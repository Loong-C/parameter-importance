training:
  max_steps: 100
  validation_every_steps: 25
  gradient_clip_max_norm: 1.0
scheduler:
  kind: cosine
  warmup_steps: 10
  total_steps: 100
providers:
  kind: offline_hf
  model_manifest_ref: manifests/model/pythia-14m.json
  model_root_ref: assets/model/pythia-14m
  data_manifest_ref: manifests/data/pile-pretokenized.json
  data_root_ref: assets/data/pile-pretokenized
  tokenizer_manifest_ref: manifests/tokenizer/pythia.json
  tokenizer_root_ref: assets/tokenizer/pythia
  task_type: causal_lm
  task_name: pile
  num_labels: null
evaluation:
  enabled: true
  split: validation
  every_steps: 25
  batch_size: 2
  max_batches: 16
  metrics: [loss, perplexity]
checkpoint_schedule:
  segments:
    - {start_step: 0, end_step: 25, every_steps: 5}
    - {start_step: 25, end_step: null, every_steps: 25}
launcher:
  kind: local
  backend: local
  world_size: 1
  init_method: local
  rendezvous_id: null
artifacts:
  output_dir: runs/formal/stage1-pythia14m
